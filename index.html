<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境警告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a14;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(30, 10, 60, 0.3) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(60, 10, 30, 0.2) 0%, transparent 30%);
            overflow: hidden;
            cursor: pointer;
        }
        
        .warning-container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        
        .dream-effect {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            background: radial-gradient(ellipse at center, rgba(120, 80, 200, 0.2) 0%, transparent 70%);
            filter: blur(20px);
            z-index: 0;
        }
        
        .main-warning {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 3rem;
            text-shadow: 0 0 10px rgba(180, 100, 255, 0.5);
            letter-spacing: 1px;
            position: relative;
            padding: 1.5rem;
            border-radius: 10px;
            background-color: rgba(20, 10, 40, 0.3);
            border: 1px solid rgba(120, 80, 200, 0.2);
        }
        
        .main-warning::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(180, 100, 255, 0.05), transparent);
            animation: shimmer 8s infinite linear;
            border-radius: 10px;
            z-index: -1;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .time-display {
            font-size: 1.8rem;
            color: #aaa;
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            background-color: rgba(30, 30, 40, 0.5);
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            display: inline-block;
            border: 1px solid rgba(100, 100, 120, 0.2);
        }
        
        .permission-denied {
            font-size: 1.2rem;
            color: #ff4444;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 1rem;
            padding: 0.8rem 2rem;
            display: inline-block;
            border-radius: 4px;
            background-color: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }
        
        .time-glow {
            animation: timeGlow 0.5s ease-out;
        }
        
        @keyframes timeGlow {
            0% { background-color: rgba(30, 30, 40, 0.5); }
            50% { background-color: rgba(100, 100, 255, 0.3); box-shadow: 0 0 20px rgba(100, 100, 255, 0.5); }
            100% { background-color: rgba(30, 30, 40, 0.5); }
        }
        
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
        
        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 60, 180, 0.1) 0%, transparent 70%);
            filter: blur(5px);
            z-index: 0;
        }
        
        .floating-element:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 10%;
            left: 10%;
            animation: float 25s infinite linear;
        }
        
        .floating-element:nth-child(2) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            right: 15%;
            animation: float 20s infinite linear reverse;
        }
        
        .floating-element:nth-child(3) {
            width: 60px;
            height: 60px;
            top: 40%;
            right: 20%;
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, 20px) rotate(90deg); }
            50% { transform: translate(0, 40px) rotate(180deg); }
            75% { transform: translate(-20px, 20px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        
        .corrupted-mode {
            animation: glitch 0.1s infinite;
            filter: hue-rotate(90deg) contrast(1.5);
        }
        
        .corrupted-mode .main-warning,
        .corrupted-mode .time-display,
        .corrupted-mode .permission-denied {
            font-family: "SimSun", "NSimSun", "SimHei", "KaiTi", "FangSong", monospace;
            animation: textGlitch 0.3s infinite;
        }
        
        .corrupted-mode .main-warning {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }
        
        .corrupted-mode .time-display {
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
        }
        
        .corrupted-mode .permission-denied {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        @keyframes textGlitch {
            0% { filter: hue-rotate(0deg); opacity: 1; }
            25% { filter: hue-rotate(90deg); opacity: 0.8; }
            50% { filter: hue-rotate(180deg); opacity: 0.9; }
            75% { filter: hue-rotate(270deg); opacity: 0.7; }
            100% { filter: hue-rotate(360deg); opacity: 1; }
        }
        
        .hidden {
            display: none;
        }
        
        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .corrupted-text {
            position: absolute;
            font-family: monospace;
            color: #00ff00;
            font-size: 0.8rem;
            opacity: 0.3;
            z-index: 1001;
        }
        
        @media (max-width: 768px) {
            .main-warning {
                font-size: 2.2rem;
                padding: 1rem;
            }
            
            .time-display {
                font-size: 1.4rem;
            }
            
            .permission-denied {
                font-size: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .main-warning {
                font-size: 1.8rem;
            }
            
            .time-display {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    
    <div class="dream-effect"></div>
    
    <div class="warning-container" id="main-content">
        <div class="main-warning" id="warning-text">
            您已入梦，窥探现实可能会造成不可挽回的后果。
        </div>
        
        <div class="time-display" id="time-display">
            时间：■■■■年8月32日 <span id="current-time"></span>
        </div>
        
        <div class="permission-denied" id="permission-text">
            [Permission Denied]
        </div>
    </div>
    
    <div id="error-overlay" class="error-overlay"></div>

    <script>
        let fakeTime = {
            hours: 0,
            minutes: 0,
            seconds: 0
        };
        let isCorrupted = false;
        let corruptionLevel = 0;
        
        function getCurrentTime() {
            const now = new Date();
            return {
                hours: now.getHours(),
                minutes: now.getMinutes(),
                seconds: now.getSeconds()
            };
        }
        
        function initializeTime() {
            const now = getCurrentTime();
            fakeTime = { ...now };
        }
        
        function updateDisplay() {
            const timeDisplay = document.getElementById('current-time');
            const hoursStr = fakeTime.hours.toString().padStart(2, '0');
            const minutesStr = fakeTime.minutes.toString().padStart(2, '0');
            const secondsStr = fakeTime.seconds.toString().padStart(2, '0');
            
            timeDisplay.textContent = `${hoursStr}:${minutesStr}:${secondsStr}`;
            
            if (fakeTime.hours >= 24 && !isCorrupted) {
                startCorruption();
            }
        }
        
        function advanceTime(minutes) {
            if (isCorrupted) return;
            
            fakeTime.minutes += minutes;
            
            while (fakeTime.minutes >= 60) {
                fakeTime.minutes -= 60;
                fakeTime.hours += 1;
            }
            
            while (fakeTime.hours >= 24) {
                fakeTime.hours -= 24;
            }
            
            const timeElement = document.getElementById('time-display');
            timeElement.classList.add('time-glow');
            setTimeout(() => {
                timeElement.classList.remove('time-glow');
            }, 500);
        }
        
        function startCorruption() {
            isCorrupted = true;
            corruptionLevel = 0;
            
            document.body.classList.add('corrupted-mode');
            const overlay = document.getElementById('error-overlay');
            overlay.style.opacity = '1';
            
            const texts = [
                '您已入梦，窥探现实可能会造成不可挽回的后果。',
                'Permission Denied',
                '时间：■■■■年8月32日'
            ];
            
            const originalTexts = texts.map(text => text);
            const corruptedTexts = texts.map(text => corruptText(text));
            
            const interval = setInterval(() => {
                corruptionLevel += 0.1;
                
                if (corruptionLevel >= 1) {
                    clearInterval(interval);
                    applyFullCorruption();
                } else {
                    const warningText = document.getElementById('warning-text');
                    const permissionText = document.getElementById('permission-text');
                    const timeDisplay = document.getElementById('time-display');
                    
                    warningText.textContent = mixText(originalTexts[0], corruptedTexts[0], corruptionLevel);
                    permissionText.textContent = mixText(originalTexts[1], corruptedTexts[1], corruptionLevel);
                    timeDisplay.textContent = '时间：■■■■年8月32日 ' + document.getElementById('current-time').textContent;
                    
                    overlay.style.backgroundColor = `rgba(255, 0, 0, ${corruptionLevel * 0.3})`;
                    
                    createErrorText();
                }
            }, 100);
        }
        
        function corruptText(text) {
            const encodingTypes = ['gbk', 'big5', 'shift-jis', 'euc-kr', 'iso-8859-1'];
            let corrupted = '';
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const charCode = char.charCodeAt(0);
                
                if (Math.random() > 0.7) {
                    if (charCode > 127) {
                        corrupted += String.fromCharCode(charCode + Math.floor(Math.random() * 100) - 50);
                    } else {
                        corrupted += String.fromCharCode(Math.floor(Math.random() * 256));
                    }
                } else if (Math.random() > 0.9) {
                    corrupted += '�';
                } else {
                    corrupted += char;
                }
            }
            
            return corrupted;
        }
        
        function mixText(original, corrupted, ratio) {
            let result = '';
            for (let i = 0; i < Math.max(original.length, corrupted.length); i++) {
                if (Math.random() < ratio) {
                    result += corrupted[i] || '�';
                } else {
                    result += original[i] || ' ';
                }
            }
            return result;
        }
        
        function applyFullCorruption() {
            const warningText = document.getElementById('warning-text');
            const permissionText = document.getElementById('permission-text');
            
            warningText.textContent = corruptText('您已入梦，窥探现实可能会造成不可挽回的后果。');
            permissionText.textContent = corruptText('[Permission Denied]');
            
            setInterval(createErrorText, 100);
            
            setInterval(() => {
                if (Math.random() > 0.5) {
                    warningText.textContent = corruptText(warningText.textContent);
                }
                if (Math.random() > 0.5) {
                    permissionText.textContent = corruptText(permissionText.textContent);
                }
            }, 500);
        }
        
        function createErrorText() {
            const overlay = document.getElementById('error-overlay');
            const errorText = document.createElement('div');
            errorText.className = 'corrupted-text';
            
            const chars = '�¡¢£¤¥¦§¨©ª«¬­®¯°±²³´µ¶·¸¹º»¼½¾¿ÀÁÂÃÄÅÆÇÈÉÊËÌÍÎÏÐÑÒÓÔÕÖ×ØÙÚÛÜÝÞßàáâãäåæçèéêëìíîïðñòóôõö÷øùúûüýþÿ';
            let text = '';
            for (let i = 0; i < 20; i++) {
                text += chars[Math.floor(Math.random() * chars.length)];
            }
            
            errorText.textContent = text;
            errorText.style.left = Math.random() * 100 + '%';
            errorText.style.top = Math.random() * 100 + '%';
            errorText.style.opacity = Math.random() * 0.5 + 0.1;
            
            overlay.appendChild(errorText);
            
            setTimeout(() => {
                if (errorText.parentNode === overlay) {
                    overlay.removeChild(errorText);
                }
            }, 3000);
        }
        
        function handleClick(event) {
            if (isCorrupted) return;
            
            advanceTime(30);
            updateDisplay();
            
            document.body.style.animation = 'shake 0.3s';
            setTimeout(() => {
                document.body.style.animation = '';
            }, 300);
        }
        
        function updateRealTime() {
            if (!isCorrupted) {
                const now = getCurrentTime();
                fakeTime.seconds = now.seconds;
                updateDisplay();
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            initializeTime();
            updateDisplay();
            setInterval(updateRealTime, 1000);
            
            const warningText = document.querySelector('.main-warning');
            
            warningText.addEventListener('mouseenter', function() {
                this.style.textShadow = '0 0 15px rgba(180, 100, 255, 0.8)';
                this.style.transform = 'scale(1.02)';
                this.style.transition = 'all 0.3s ease';
            });
            
            warningText.addEventListener('mouseleave', function() {
                this.style.textShadow = '0 0 10px rgba(180, 100, 255, 0.5)';
                this.style.transform = 'scale(1)';
            });
            
            document.body.addEventListener('click', handleClick);
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    25% { transform: translateX(-5px); }
                    75% { transform: translateX(5px); }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
