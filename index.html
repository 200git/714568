<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>警告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a14;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(30, 10, 60, 0.3) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(60, 10, 30, 0.2) 0%, transparent 30%);
            overflow: hidden;
        }
        
        .warning-container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        
      
        .dream-effect {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            background: radial-gradient(ellipse at center, rgba(120, 80, 200, 0.2) 0%, transparent 70%);
            filter: blur(20px);
            z-index: 0;
        }
        
        .main-warning {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 3rem;
            text-shadow: 0 0 10px rgba(180, 100, 255, 0.5);
            letter-spacing: 1px;
            position: relative;
            padding: 1.5rem;
            border-radius: 10px;
            background-color: rgba(20, 10, 40, 0.3);
            border: 1px solid rgba(120, 80, 200, 0.2);
        }
        
      
        .main-warning::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(180, 100, 255, 0.05), transparent);
            animation: shimmer 8s infinite linear;
            border-radius: 10px;
            z-index: -1;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .time-display {
            font-size: 1.8rem;
            color: #aaa;
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            background-color: rgba(30, 30, 40, 0.5);
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            display: inline-block;
            border: 1px solid rgba(100, 100, 120, 0.2);
        }
      
        .year-masked {
            font-family: monospace;
            letter-spacing: 8px;
            background-color: #111;
            padding: 0 5px;
            border-radius: 4px;
            border: 1px solid #333;
        }
        
        .month-day {
            color: #bbb;
        }
        
        .permission-denied {
            font-size: 1.2rem;
            color: #ff4444;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 1rem;
            padding: 0.8rem 2rem;
            display: inline-block;
            border-radius: 4px;
            background-color: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
      
        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 60, 180, 0.1) 0%, transparent 70%);
            filter: blur(5px);
            z-index: 0;
        }
        
        .floating-element:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 10%;
            left: 10%;
            animation: float 25s infinite linear;
        }
        
        .floating-element:nth-child(2) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            right: 15%;
            animation: float 20s infinite linear reverse;
        }
        
        .floating-element:nth-child(3) {
            width: 60px;
            height: 60px;
            top: 40%;
            right: 20%;
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, 20px) rotate(90deg); }
            50% { transform: translate(0, 40px) rotate(180deg); }
